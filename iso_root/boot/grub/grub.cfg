set default=0
set timeout=3

insmod part_gpt
insmod part_msdos
insmod fat
insmod ext2
insmod iso9660
insmod linux

terminal_input console
terminal_output console

menuentry "Forge Linux" {
    linux /boot/vmlinuz quiet console=tty0
    initrd /boot/initrd.img
}

menuentry "Forge Linux (nomodeset)" {
    linux /boot/vmlinuz quiet nomodeset console=tty0
    initrd /boot/initrd.img
}

menuentry "Forge Linux (safe mode)" {
    linux /boot/vmlinuz console=tty0 init=/bin/sh
    initrd /boot/initrd.img
}
